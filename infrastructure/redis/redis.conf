# Redis configuration for the Stock Agent System

# ── Persistence ───────────────────────────────────────────────────────────────
# Save a snapshot every 60 s if at least 1 key changed
save 60 1
save 300 10

# Append-Only File for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── Memory ────────────────────────────────────────────────────────────────────
# Cap Redis memory at 256 MB; evict least-recently-used keys when full.
# Analysis cache entries have their own TTL so LRU is a safe fallback.
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Connection ────────────────────────────────────────────────────────────────
# Listen on all interfaces inside Docker
bind 0.0.0.0

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
